<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>NeuraAPI - OG Launch Image</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1200px;
            height: 630px;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        .card {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(139, 92, 246, 0.2) 0%, transparent 50%);
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 60px;
        }

        .logo {
            font-size: 72px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -2px;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .logo span {
            color: #818cf8;
        }

        .tagline {
            font-size: 32px;
            font-weight: 500;
            color: #c7d2fe;
            margin-bottom: 40px;
            max-width: 800px;
            line-height: 1.3;
        }

        .url {
            font-size: 24px;
            font-weight: 600;
            color: #a5b4fc;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 30px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .badge {
            position: absolute;
            top: 40px;
            right: 40px;
            background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(249, 115, 22, 0.4);
        }

        .features {
            display: flex;
            gap: 40px;
            margin-top: 40px;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #e0e7ff;
            font-size: 20px;
        }

        .feature-icon {
            width: 24px;
            height: 24px;
            background: #818cf8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">Product Hunt Launch</div>
        <div class="content">
            <div class="logo">Neura<span>API</span></div>
            <div class="tagline">AI APIs + Premium Next.js Templates in 10 Languages</div>
            <div class="url">ai-empire-steel.vercel.app</div>
            <div class="features">
                <div class="feature">
                    <div class="feature-icon">✓</div>
                    <span>3 AI Endpoints</span>
                </div>
                <div class="feature">
                    <div class="feature-icon">✓</div>
                    <span>Premium Templates</span>
                </div>
                <div class="feature">
                    <div class="feature-icon">✓</div>
                    <span>Free Tier</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
